name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hybrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hybrid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Runtime conn (non-superuser, RLS forced) — created by db:migrate (00_roles + 04_grant).
      DATABASE_URL: postgres://app_runtime_login:app_runtime_local_pw@localhost:5432/hybrid
      # Direct/superuser conn for migrate + seed + type gen.
      DIRECT_URL: postgres://postgres:postgres@localhost:5432/hybrid
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_ROOT_DOMAIN: lvh.me
      DEV_SESSION_SECRET: ci-test-secret
      # Must decode to exactly 32 bytes (AES-256-GCM). Test-only key.
      APP_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Apply 00,01,02,04 as superuser, then 03 seed. CI starts from empty DB,
      # so migrate creates roles/schema/policies/grant before seeding.
      - name: Migrate
        run: pnpm --filter @hybrid/db db:migrate

      - name: Seed
        run: pnpm --filter @hybrid/db db:seed

      # Generate types and fail on drift (kysely-codegen vs committed src/types.ts).
      - name: Generate types (drift check)
        run: |
          pnpm --filter @hybrid/db db:gen
          git diff --exit-code packages/db/src/types.ts

      # THE GATE: RLS isolation suite must pass on every PR.
      - name: RLS test suite
        run: pnpm --filter @hybrid/db test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # Auto-deploy: only after the build gate is green, only on push to master.
  # SSHes to the VPS and runs the existing self-healing deploy.sh
  # (git pull --ff-only origin master → docker compose build+recreate web).
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17  # v1.2.0
        with:
          host: 72.62.228.196
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/hybrid/deploy.sh
