services:
  postgres:
    image: postgres:16-alpine
    container_name: hybrid-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hybrid
    volumes:
    - hybrid_pgdata:/var/lib/postgresql/data
    - ./packages/db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d hybrid
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: hybrid-redis
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  web:
    container_name: hybrid-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN}
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
        DEV_SESSION_SECRET: ${DEV_SESSION_SECRET}
        SESSION_SECRET: ${SESSION_SECRET}
        REDIS_URL: ${REDIS_URL}
        CRON_SECRET: ${CRON_SECRET}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      DEV_SESSION_SECRET: ${DEV_SESSION_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_URL: ${REDIS_URL}
      CRON_SECRET: ${CRON_SECRET}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-dev}
      BLOB_DRIVER: ${BLOB_DRIVER:-local}
      SMS_LIVE: 'false'
      ALLOW_DEV_LOGIN: 'false'
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    expose:
    - '3000'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - default
    - supabasenet
  caddy:
    image: caddy:2-alpine
    container_name: hybrid-caddy
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile:ro
    - caddy_data:/data
    - caddy_config:/config
    depends_on:
    - web
    restart: unless-stopped
    networks:
    - default
    - supabasenet
  # ---- Hybrid Pay engine (self-hosted PipraPay, AGPL-3.0) --------------------
  # Opt-in via `docker compose --profile hybridpay up -d`. PipraPay is a PHP app
  # served from source cloned to ./piprapay (see docs/INFRA_HYBRIDPAY.md). It is
  # on the same `default` network as Caddy, so the pay.hybrid.ecomex.cloud block
  # reaches it as hybrid-piprapay:80. Founder = super admin; each tenant is a
  # "brand" with its own API key (what they paste into Hybrid Pay settings).
  piprapay:
    build:
      context: .
      dockerfile: piprapay.Dockerfile
    image: hybrid-piprapay:local
    container_name: hybrid-piprapay
    profiles:
    - hybridpay
    working_dir: /var/www/html
    volumes:
    - ./piprapay:/var/www/html
    depends_on:
      piprapay-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - default
  piprapay-db:
    image: mysql:8
    container_name: hybrid-piprapay-db
    profiles:
    - hybridpay
    environment:
      MYSQL_ROOT_PASSWORD: ${PIPRAPAY_DB_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${PIPRAPAY_DB_NAME:-piprapay}
      MYSQL_USER: ${PIPRAPAY_DB_USER:-piprapay}
      MYSQL_PASSWORD: ${PIPRAPAY_DB_PASSWORD:-change_me}
    volumes:
    - hybrid_piprapay_dbdata:/var/lib/mysql
    healthcheck:
      test:
      - CMD
      - mysqladmin
      - ping
      - -h
      - localhost
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
    - default
volumes:
  hybrid_pgdata: null
  hybrid_piprapay_dbdata: null
  caddy_data: null
  caddy_config: null
networks:
  supabasenet:
    name: pe9o2li2n3bns3wnofob49uw
    external: true
