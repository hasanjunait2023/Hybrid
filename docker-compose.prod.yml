# Hybrid — production stack (single VPS, IP:port access).
# Postgres + Redis internal; web exposed on :3000.
# Secrets come from a sibling `.env.deploy` file (compose --env-file).
services:
  postgres:
    image: postgres:16-alpine
    container_name: hybrid-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hybrid
    volumes:
      - hybrid_pgdata:/var/lib/postgresql/data
      - ./packages/db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hybrid"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hybrid-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: hybrid-pgbouncer
    volumes:
      - /opt/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - /opt/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    command: pgbouncer /etc/pgbouncer/pgbouncer.ini
    networks:
      - hybrid_default
      - pe9o2li2n3bns3wnofob49uw
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=app_runtime_local_pw psql -h 127.0.0.1 -p 6432 -U app_runtime_login -d postgres -tAc 'SELECT 1' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    container_name: hybrid-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN}
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
        DEV_SESSION_SECRET: ${DEV_SESSION_SECRET}
        SESSION_SECRET: ${SESSION_SECRET}
        REDIS_URL: ${REDIS_URL}
        CRON_SECRET: ${CRON_SECRET}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      READ_DATABASE_URL: ${READ_DATABASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      DEV_SESSION_SECRET: ${DEV_SESSION_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_URL: ${REDIS_URL}
      CRON_SECRET: ${CRON_SECRET}
      AUTH_PROVIDER: ${AUTH_PROVIDER}
      BLOB_DRIVER: ${BLOB_DRIVER}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SMS_LIVE: "false"
      GLITCHTIP_DSN: 
      GLITCHTIP_PUBLIC_URL: 
      HYBRID_ENABLE_TEST_ROUTES: ${HYBRID_ENABLE_TEST_ROUTES}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hybrid_default
      - pe9o2li2n3bns3wnofob49uw
    healthcheck:
      test: ["CMD-SHELL", "node scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # --- Error tracking (GlitchTip, Sentry-API compatible) ---
  glitchtip-db:
    image: postgres:15-alpine
    container_name: glitchtip-db
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip_local_secret_2026
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-web
    depends_on:
      glitchtip-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://glitchtip:glitchtip_local_secret_2026@glitchtip-db:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: change_me_in_env_2026_production
      GLITCHTIP_EMBED_WORKER: "true"
      EMAIL_HOST: ""
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      ENABLE_SOCIAL_AUTH: "False"
      ENABLE_USER_REGISTRATION: "false"
      GLITCHTIP_DOMAIN: https://errors.hybrid.ecomex.cloud
      SITE_URL: https://errors.hybrid.ecomex.cloud
      ENABLE_TELEMETRY: "False"
    ports:
      - "8000:8000"
    networks:
      - hybrid_default
    restart: unless-stopped

volumes:
  hybrid_pgdata:
  glitchtip_pgdata:



networks:
  hybrid_default:
    name: hybrid_default
    external: true
  pe9o2li2n3bns3wnofob49uw:
    name: pe9o2li2n3bns3wnofob49uw
    external: true
