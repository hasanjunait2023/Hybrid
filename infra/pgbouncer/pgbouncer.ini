# PgBouncer Configuration — transaction-mode pooling
# Template for Phase B deployment (multi-instance web scale)

[databases]
postgres = host=supabase-db port=5432 dbname=postgres
pgbouncer = host=localhost port=6432 dbname=pgbouncer

[pgbouncer]
# Connection pooling
pool_mode = transaction
max_client_conn = 200
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# Performance tuning
server_lifetime = 3600
server_idle_timeout = 600
client_idle_timeout = 900
query_timeout = 0

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Statistics
stats_users = postgres

# Application lifecycle
application_name_add_host = 1
